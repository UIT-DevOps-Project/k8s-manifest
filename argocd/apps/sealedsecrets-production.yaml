apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealedsecrets-production
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/UIT-DevOps-Project/k8s-manifest
    targetRevision: main
    path: sealedsecrets/production
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true