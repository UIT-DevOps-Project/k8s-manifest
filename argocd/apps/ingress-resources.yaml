apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-resources
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/UIT-DevOps-Project/k8s-manifest
    targetRevision: feat/user-flow-complete
    path: ingress/resources
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
