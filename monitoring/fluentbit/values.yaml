fluent-bit:
  kind: DaemonSet

  daemonSet:
    enabled: true

  envFrom:
    - secretRef:
        name: opensearch-admin-secret

  # Persistent storage for file offsets — prevents re-reading all logs on restart
  extraVolumes:
    - name: fluent-bit-db
      hostPath:
        path: /var/lib/fluent-bit
        type: DirectoryOrCreate

  extraVolumeMounts:
    - name: fluent-bit-db
      mountPath: /var/lib/fluent-bit

  config:
    service: |
      [SERVICE]
          Daemon Off
          Flush 5
          Log_Level info
          Parsers_File parsers.conf
          Parsers_File custom_parsers.conf
          HTTP_Server On
          HTTP_Listen 0.0.0.0
          HTTP_Port 2020
          Health_Check On
          storage.path /var/lib/fluent-bit/
          storage.sync normal
          storage.checksum off
          storage.max_chunks_up 256

    inputs: |
      [INPUT]
          Name tail
          Path /var/log/containers/*.log
          Exclude_Path /var/log/containers/fluentbit-fluent-bit-*.log
          multiline.parser docker, cri
          Tag kube.*
          Mem_Buf_Limit 10MB
          Skip_Long_Lines On
          storage.type filesystem
          DB /var/lib/fluent-bit/tail-pos.db

    filters: |
      [FILTER]
          Name kubernetes
          Match kube.*
          Merge_Log On
          Keep_Log Off
          K8S-Logging.Parser On
          K8S-Logging.Exclude On

      [FILTER]
          Name    record_modifier
          Match   kube.*
          Record  level unknown

    outputs: |
      [OUTPUT]
          Name opensearch
          Match kube.*
          Host opensearch-cluster-master
          Port 9200
          HTTP_User admin
          HTTP_Passwd ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
          Logstash_Format On
          Logstash_Prefix k8s
          Suppress_Type_Name On
          Retry_Limit False
          TLS On
          TLS.Verify Off
          Workers 2
          net.connect_timeout 15
          net.keepalive on
          net.keepalive_idle_timeout 30
          Trace_Error On
