fluent-bit:
  kind: DaemonSet
  # DaemonSet is default for Fluent Bit Helm chart, but being explicit.
  
  daemonSet:
    enabled: true

  envFrom:
    - secretRef:
        name: opensearch-admin-secret
    
  config:
    service: |
      [SERVICE]
          Daemon Off
          Flush 1
          Log_Level info
          Parsers_File parsers.conf
          Parsers_File custom_parsers.conf
          HTTP_Server On
          HTTP_Listen 0.0.0.0
          HTTP_Port 2020
          Health_Check On

    inputs: |
      [INPUT]
          Name tail
          Path /var/log/containers/*.log
          Exclude_Path /var/log/containers/fluentbit-fluent-bit-*.log
          multiline.parser docker, cri
          Tag kube.*
          Mem_Buf_Limit 5MB
          Skip_Long_Lines On

    filters: |
      [FILTER]
          Name kubernetes
          Match kube.*
          Merge_Log On
          Keep_Log Off
          K8S-Logging.Parser On
          K8S-Logging.Exclude On

    outputs: |
      [OUTPUT]
          Name opensearch
          Match kube.*
          Host opensearch-cluster-master
          Port 9200
          HTTP_User admin
          HTTP_Passwd ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
          Logstash_Format On
          Logstash_Prefix k8s
          Suppress_Type_Name On
          Retry_Limit False
          TLS On
          TLS.Verify Off
