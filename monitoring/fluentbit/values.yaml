fluent-bit:
  kind: DaemonSet

  daemonSet:
    enabled: true

  envFrom:
    - secretRef:
        name: opensearch-admin-secret

  # Persistent storage for file offsets — prevents re-reading all logs on restart
  extraVolumes:
    - name: fluent-bit-db
      hostPath:
        path: /var/lib/fluent-bit
        type: DirectoryOrCreate

  extraVolumeMounts:
    - name: fluent-bit-db
      mountPath: /var/lib/fluent-bit

  config:
    service: |
      [SERVICE]
          Daemon Off
          Flush 5
          Log_Level info
          Parsers_File parsers.conf
          Parsers_File custom_parsers.conf
          HTTP_Server On
          HTTP_Listen 0.0.0.0
          HTTP_Port 2020
          Health_Check On
          storage.path /var/lib/fluent-bit/
          storage.sync normal
          storage.checksum off
          storage.max_chunks_up 256

    inputs: |
      [INPUT]
          Name tail
          Path /var/log/containers/*.log
          Exclude_Path /var/log/containers/fluentbit-fluent-bit-*.log
          multiline.parser docker, cri
          Tag kube.*
          Mem_Buf_Limit 10MB
          Skip_Long_Lines On
          storage.type filesystem
          DB /var/lib/fluent-bit/tail-pos.db

    filters: |
      [FILTER]
          Name kubernetes
          Match kube.*
          Merge_Log On
          Keep_Log Off
          K8S-Logging.Parser On
          K8S-Logging.Exclude On

      [FILTER]
          Name parser
          Match kube.*
          Key_Name log
          Parser nginx_access
          Reserve_Data On
          Preserve_Key On

      [FILTER]
          Name lua
          Match kube.*
          Script /fluent-bit/scripts/set_log_level.lua
          call set_log_level

    outputs: |
      [OUTPUT]
          Name opensearch
          Match kube.*
          Host opensearch-cluster-master
          Port 9200
          HTTP_User admin
          HTTP_Passwd ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
          Logstash_Format On
          Logstash_Prefix k8s
          Suppress_Type_Name On
          Retry_Limit False
          TLS On
          TLS.Verify Off
          Workers 2
          net.connect_timeout 15
          net.keepalive on
          net.keepalive_idle_timeout 30
          Trace_Error On

    customParsers: |
      [PARSER]
          Name docker_no_time
          Format json
          Time_Keep Off
          Time_Key time
          Time_Format %Y-%m-%dT%H:%M:%S.%L

      [PARSER]
          Name nginx_access
          Format regex
          Regex ^(?<remote_addr>[^ ]+) - (?<remote_user>[^ ]+) \[(?<time_local>[^\]]+)\] "(?<http_method>\S+) (?<http_path>[^"]+) HTTP/[0-9.]+" (?<http_status>[0-9]+) (?<bytes_sent>[0-9]+) "(?<http_referer>[^"]*)" "(?<http_user_agent>[^"]*)"

  # Lua script for log level normalization
  luaScripts:
    set_log_level.lua: |
      function set_log_level(tag, timestamp, record)
          if record["http_status"] ~= nil then
              local status = tonumber(record["http_status"])
              if status >= 500 then
                  record["level"] = "error"
              elseif status >= 400 then
                  record["level"] = "warning"
              else
                  record["level"] = "info"
              end
          elseif record["level"] == nil or record["level"] == "" or record["level"] == "unknown" then
              local stream = record["stream"]
              if stream == "stderr" then
                  record["level"] = "error"
              else
                  record["level"] = "unknown"
              end
          end
          return 1, timestamp, record
      end
