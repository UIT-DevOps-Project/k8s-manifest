fluent-bit:
  kind: DaemonSet

  daemonSet:
    enabled: true

  envFrom:
    - secretRef:
        name: opensearch-admin-secret

  # Persistent storage for file offsets — prevents re-reading all logs on restart
  extraVolumes:
    - name: fluent-bit-db
      hostPath:
        path: /var/lib/fluent-bit
        type: DirectoryOrCreate

  extraVolumeMounts:
    - name: fluent-bit-db
      mountPath: /var/lib/fluent-bit

  config:
    service: |
      [SERVICE]
          Daemon Off
          Flush 5
          Log_Level info
          Parsers_File parsers.conf
          Parsers_File custom_parsers.conf
          HTTP_Server On
          HTTP_Listen 0.0.0.0
          HTTP_Port 2020
          Health_Check On
          storage.path /var/lib/fluent-bit/
          storage.sync normal
          storage.checksum off
          storage.max_chunks_up 256

    inputs: |
      [INPUT]
          Name tail
          Path /var/log/containers/*.log
          Exclude_Path /var/log/containers/fluentbit-fluent-bit-*.log
          multiline.parser docker, cri
          Tag kube.*
          Mem_Buf_Limit 10MB
          Skip_Long_Lines On
          storage.type filesystem
          DB /var/lib/fluent-bit/tail-pos.db

    filters: |
      [FILTER]
          Name kubernetes
          Match kube.*
          Merge_Log On
          Keep_Log Off
          K8S-Logging.Parser On
          K8S-Logging.Exclude On

      [FILTER]
          Name    lua
          Match   kube.*
          script  /fluent-bit/scripts/extract_level.lua
          call    extract_level

    luaScripts:
      extract_level.lua: |
        function extract_level(tag, timestamp, record)
          local log = record["log"] or ""
          local level = "unknown"
          -- JSON structured: {"level":"error",...} or {"level":"ERROR",...}
          local json_level = string.match(log, '"level"%s*:%s*"(%a+)"')
          if json_level then
            level = string.lower(json_level)
          -- NestJS: [Nest] ... ERROR [context]
          elseif string.match(log, "%[Nest%].*ERROR") or string.match(log, " ERROR ") then
            level = "error"
          elseif string.match(log, "%[Nest%].*WARN") or string.match(log, " WARN ") or string.match(log, " WARNING ") then
            level = "warn"
          elseif string.match(log, "%[Nest%].*DEBUG") or string.match(log, " DEBUG ") then
            level = "debug"
          elseif string.match(log, "%[Nest%].*LOG") or string.match(log, " INFO ") then
            level = "info"
          -- stderr = error signal
          elseif record["stream"] == "stderr" then
            level = "error"
          -- stdout default
          elseif record["stream"] == "stdout" then
            level = "info"
          end
          record["level"] = level
          return 1, timestamp, record
        end

    outputs: |
      [OUTPUT]
          Name opensearch
          Match kube.*
          Host opensearch-cluster-master
          Port 9200
          HTTP_User admin
          HTTP_Passwd ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
          Logstash_Format On
          Logstash_Prefix k8s
          Suppress_Type_Name On
          Retry_Limit False
          TLS On
          TLS.Verify Off
          Workers 2
          net.connect_timeout 15
          net.keepalive on
          net.keepalive_idle_timeout 30
          Trace_Error On
