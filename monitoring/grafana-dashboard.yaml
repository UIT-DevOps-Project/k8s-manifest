apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-k8s-production-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  k8s-production-overview.json: |
    {
      "title": "Kubernetes Production Overview",
      "uid": "k8s-production-overview",
      "tags": [
        "kubernetes",
        "production",
        "overview"
      ],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-3h",
        "to": "now"
      },
      "timepicker": {},
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "\ud83d\udcca Cluster Overview",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 1
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Cluster CPU Usage",
          "gridPos": {
            "x": 0,
            "y": 1,
            "w": 4,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "round((1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))) * 100, 0.1)",
              "instant": true,
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "decimals": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "value": null,
                    "color": "green"
                  },
                  {
                    "value": 70,
                    "color": "yellow"
                  },
                  {
                    "value": 90,
                    "color": "red"
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              },
              "mappings": []
            },
            "overrides": []
          }
        },
        {
