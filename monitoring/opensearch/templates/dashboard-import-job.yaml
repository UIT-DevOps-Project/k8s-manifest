apiVersion: batch/v1
kind: Job
metadata:
  name: opensearch-dashboard-import
  namespace: monitoring
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: dashboard-importer
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              OSD_URL="http://opensearch-opensearch-dashboards:5601"

              echo "Waiting for OpenSearch Dashboards..."
              until curl -sf -o /dev/null "$OSD_URL/api/status"; do
                echo "Not ready, retrying in 5s..."
                sleep 5
              done
              echo "Dashboards is up"

              echo "Logging in..."
              curl -s -c /tmp/cookies.txt \
                -X POST "$OSD_URL/auth/login" \
                -H "Content-Type: application/json" \
                -H "osd-xsrf: true" \
                -d "{\"username\":\"${OPENSEARCH_USER}\",\"password\":\"${OPENSEARCH_PASSWORD}\"}"
              echo ""

              echo "Importing dashboard..."
              RESULT=$(curl -s -b /tmp/cookies.txt \
                -X POST "$OSD_URL/api/saved_objects/_import?overwrite=true" \
                -H "osd-xsrf: true" \
                -F "file=@/dashboard/k8s-dashboard.ndjson")
              echo "Result: $RESULT"

              echo "$RESULT" | grep -q '"success":true' && echo "Import OK" && exit 0
              echo "Import failed" && exit 1
          env:
            - name: OPENSEARCH_USER
              valueFrom:
                secretKeyRef:
                  name: opensearch-dashboards-auth
                  key: username
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opensearch-dashboards-auth
                  key: password
          volumeMounts:
            - name: dashboard-files
              mountPath: /dashboard
      volumes:
        - name: dashboard-files
          configMap:
            name: opensearch-dashboards-config
