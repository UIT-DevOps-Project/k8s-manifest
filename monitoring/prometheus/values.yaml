kube-prometheus-stack:
  prometheusOperator:
    admissionWebhooks:
      enabled: false
    tls:
      enabled: false
    nodeSelector:
      node-group: monitor-node

  prometheus:
    prometheusSpec:
      nodeSelector:
        node-group: monitor-node
    
  grafana:
    adminPassword: "admin"
    nodeSelector:
      node-group: monitor-node
      
  alertmanager:
    alertmanagerSpec:
      nodeSelector:
        node-group: monitor-node