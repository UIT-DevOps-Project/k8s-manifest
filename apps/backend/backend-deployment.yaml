apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: devops-app
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret

      nodeSelector:
        node-group: app-nodes

      containers:
      - name: backend-app
        image: ghcr.io/uit-devops-project/backend-app:latest
        command: 
        - sh
        - -c
        - npx prisma migrate deploy && npm start

        ports:
        - containerPort: 3000

        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: DATABASE_URL
    