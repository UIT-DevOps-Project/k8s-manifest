apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Values.namespace }}

spec:
  replicas: {{ .Values.replicaCount }}

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: {{ .Chart.Name }}

  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}

    spec:

      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}

      nodeSelector:
        node-group: {{ .Values.nodeSelector }}

      containers:
        - name: backend-app

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

          command:
            - sh
            - -c
            - {{ .Values.command }}

          ports:
            - containerPort: {{ .Values.service.port }}

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretName }}
                  key: DATABASE_URL