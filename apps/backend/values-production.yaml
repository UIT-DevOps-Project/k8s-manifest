namespace: production

replicaCount: 3

image:
  repository: ghcr.io/uit-devops-project/backend-app
  tag: latest
  pullPolicy: Always

imagePullSecret: ghcr-secret

nodeSelector:
  node-group: app-nodes

command: "node src/server.js"

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000

database:
  secretName: postgres-secret

resources:
  requests:
    cpu: 150m
    memory: 192Mi
  limits:
    cpu: 500m
    memory: 512Mi

readinessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

extraEnv: []