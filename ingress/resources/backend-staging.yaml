apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend
  namespace: staging
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: ingress-resources
spec:
  ingressClassName: nginx
  rules:
    - host: staging.app.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
