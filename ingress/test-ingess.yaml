apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-ingress
  namespace: ingress-nginx
  annotations:
    kubernetes.io/ingress.class: nginx
    
spec:
  rules:
  - host: demo.uit-devops.com  
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-service 
            port:
              number: 80